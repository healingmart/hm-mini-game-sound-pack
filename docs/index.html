<script>
(() => {
  "use strict";

  const soundBases = [
    "https://healingmart.github.io/hm-mini-game-sound-pack/sfx/core/v1/",
    "https://raw.githubusercontent.com/healingmart/hm-mini-game-sound-pack/main/docs/sfx/core/v1/"
  ];
  const status = document.getElementById("previewStatus");
  const stopButton = document.getElementById("stopPreview");
  let currentAudio = null;
  let currentButton = null;

  function setStatus(message) {
    status.textContent = message;
  }

  function clearPlayingState() {
    if (currentButton) {
      currentButton.classList.remove("is-playing");
      currentButton.removeAttribute("aria-pressed");
    }
    currentButton = null;
  }

  function stopCurrent(message = "사운드 정지") {
    if (currentAudio) {
      currentAudio.pause();
      currentAudio.currentTime = 0;
      currentAudio.src = "";
      currentAudio = null;
    }
    clearPlayingState();
    setStatus(message);
  }

  async function playPreview(button) {
    const name = button.dataset.sound;
    if (!name) return;

    stopCurrent("사운드 준비 중");

    const encodedName = encodeURIComponent(name);
    const urls = soundBases.map((base) => base + encodedName + ".mp3?v=20260716");
    let lastError = null;

    currentButton = button;
    button.classList.add("is-playing");
    button.setAttribute("aria-pressed", "true");

    for (let index = 0; index < urls.length; index += 1) {
      const url = urls[index];
      const audio = new Audio(url);
      audio.preload = "auto";
      audio.volume = 0.9;
      currentAudio = audio;

      try {
        await audio.play();

        audio.addEventListener("playing", () => {
          if (currentAudio === audio) setStatus(name + " 재생 중");
        }, { once: true });

        audio.addEventListener("ended", () => {
          if (currentAudio === audio) {
            currentAudio = null;
            clearPlayingState();
            setStatus(name + " 재생 완료");
          }
        }, { once: true });

        return;
      } catch (error) {
        lastError = error;
        audio.pause();
        audio.src = "";
        if (currentAudio === audio) currentAudio = null;
      }
    }

    clearPlayingState();
    setStatus(name + " 파일을 공개 주소에서 불러오지 못했습니다. GitHub Pages 배포 상태를 확인해 주세요.");
    console.error("Sound preview failed:", name, urls, lastError);
  }

  document.addEventListener("click", (event) => {
    const button = event.target.closest("[data-sound]");
    if (button) playPreview(button);
  });

  stopButton.addEventListener("click", () => stopCurrent());
  window.addEventListener("pagehide", () => stopCurrent("사운드 대기 중"));
})();
</script>
