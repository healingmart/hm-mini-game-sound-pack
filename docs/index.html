<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>Healing Mart Mini Game Sound Pack v1</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 28px;
      background: #f4f6fb;
      color: #20263a;
      font-family: system-ui, -apple-system, "Noto Sans KR", sans-serif;
    }

    main {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
    }

    h1 { margin: 0 0 8px; }

    p { color: #667085; }

    .notice {
      padding: 13px 15px;
      border-radius: 12px;
      background: #eeeaff;
      color: #4d43b8;
      font-weight: 700;
    }

    .status {
      min-height: 24px;
      margin: 12px 0 0;
      color: #475467;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 10px;
      margin-top: 22px;
    }

    button {
      min-height: 76px;
      padding: 13px;
      text-align: left;
      border: 1px solid #dfe4ed;
      border-radius: 14px;
      background: #fff;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(30, 40, 75, 0.06);
      transition: transform 0.15s ease, border-color 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: #8b80ef;
    }

    button:focus-visible {
      outline: 3px solid rgba(139, 128, 239, 0.3);
      outline-offset: 2px;
    }

    strong,
    small { display: block; }

    small {
      margin-top: 4px;
      color: #7b8498;
    }
  </style>
</head>
<body>
  <main>
    <h1>Healing Mart Mini Game Sound Pack v1</h1>
    <p class="notice">기본은 무음입니다. 아래 버튼을 직접 누르면 소리가 켜지고 해당 효과음을 미리 들을 수 있습니다.</p>
    <p id="soundStatus" class="status" role="status" aria-live="polite">사운드 대기 중</p>

    <div class="grid">
      <button type="button" data-sound="ui-tap"><strong>ui-tap</strong><small>일반 버튼 터치</small></button>
      <button type="button" data-sound="ui-select"><strong>ui-select</strong><small>옵션 선택 완료</small></button>
      <button type="button" data-sound="ui-open"><strong>ui-open</strong><small>모달·바텀시트 열기</small></button>
      <button type="button" data-sound="ui-close"><strong>ui-close</strong><small>모달·바텀시트 닫기</small></button>
      <button type="button" data-sound="toggle-on"><strong>toggle-on</strong><small>소리·옵션 켜기</small></button>
      <button type="button" data-sound="toggle-off"><strong>toggle-off</strong><small>소리·옵션 끄기</small></button>
      <button type="button" data-sound="ui-error"><strong>ui-error</strong><small>입력 오류·실행 불가</small></button>
      <button type="button" data-sound="ready"><strong>ready</strong><small>게임 준비 완료</small></button>
      <button type="button" data-sound="countdown"><strong>countdown</strong><small>3·2·1 카운트다운</small></button>
      <button type="button" data-sound="go"><strong>go</strong><small>게임 출발</small></button>
      <button type="button" data-sound="item-move"><strong>item-move</strong><small>블록·말·카드 이동</small></button>
      <button type="button" data-sound="reward-coin"><strong>reward-coin</strong><small>점수·보상 획득</small></button>
      <button type="button" data-sound="combo"><strong>combo</strong><small>연속 성공·콤보</small></button>
      <button type="button" data-sound="timer-warning"><strong>timer-warning</strong><small>제한시간 경고</small></button>
      <button type="button" data-sound="reveal-safe"><strong>reveal-safe</strong><small>안전·면제 결과</small></button>
      <button type="button" data-sound="reveal-danger"><strong>reveal-danger</strong><small>벌칙·폭탄 결과</small></button>
      <button type="button" data-sound="success"><strong>success</strong><small>스테이지 성공</small></button>
      <button type="button" data-sound="fail"><strong>fail</strong><small>실패·시간 종료</small></button>
      <button type="button" data-sound="brand-finish"><strong>brand-finish</strong><small>Healing Mart 공통 완료 시그니처</small></button>
    </div>
  </main>

  <script src="./js/hm-audio-manager.v1.js"></script>
  <script>
    HMAudio.init({
      baseUrl: "./sfx/core/v1/",
      volume: 0.75
    });

    const soundStatus = document.getElementById("soundStatus");

    document.addEventListener("click", async (event) => {
      const button = event.target.closest("[data-sound]");

      if (!button) {
        return;
      }

      const soundName = button.dataset.sound;

      if (!HMAudio.isEnabled()) {
        HMAudio.setEnabled(true);
      }

      HMAudio.unlock();
      soundStatus.textContent = `${soundName} 재생 중`;

      const played = await HMAudio.play(soundName);
      soundStatus.textContent = played
        ? `${soundName} 재생 완료`
        : `${soundName} 파일 대신 대체음을 재생했습니다.`;
    });
  </script>
</body>
</html>
