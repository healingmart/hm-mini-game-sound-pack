<style>

body{margin:0}

  <h1>Healing Mart Mini Game Sound Pack</h1>

button type="button" class="sound-card" data-sound="item-lock"><strong>item-lock</strong><small>잠금·고정</small></button><button type="button" class="sound-card" data-sound="item-unlock"><strong>item-unlock</strong><small>잠금 해제</small></button><button type="button" class="sound-card" data-sound="card-flip"><strong>card-flip</strong><small>카드 뒤집기</small></button><button type="button" class="sound-card" data-sound="block-place"><strong>block-place</strong><small>블록 정확히 놓기</small></button><button type="button" class="sound-card" data-sound="hint"><strong>hint</strong><small>힌트 열기</small></button><button type="button" class="sound-card" data-sound="hint-used"><strong>hint-used</strong><small>힌트 사용 완료</small></button><button type="button" class="sound-card" data-sound="shuffle"><strong>shuffle</strong><small>항목 섞기</small></button><button type="button" class="sound-card" data-sound="spin-tick"><strong>spin-tick</strong><small>룰렛 칸 통과음</small></button><button type="button" class="sound-card" data-sound="spin-stop"><strong>spin-stop</strong><small>룰렛 정지</small></button><button type="button" class="sound-card" data-sound="random-reveal"><strong>random-reveal</strong><small>랜덤 결과 공개</small></button><button type="button" class="sound-card" data-sound="winner"><strong>winner</strong><small>당첨자·승자 발표</small></button><button type="button" class="sound-card" data-sound="loser"><strong>loser</strong><small>탈락자·패자 발표</small></button><button type="button" class="sound-card" data-sound="jump"><strong>jump</strong><small>점프 동작</small></button><button type="button" class="sound-card" data-sound="land"><strong>land</strong><small>착지 동작</small></button><button type="button" class="sound-card" data-sound="dash"><strong>dash</strong><small>빠른 이동·부스트</small></button><button type="button" class="sound-card" data-sound="target-hit"><strong>target-hit</strong><small>타깃 명중</small></button><button type="button" class="sound-card" data-sound="target-miss"><strong>target-miss</strong><small>타깃 빗나감</small></button><button type="button" class="sound-card" data-sound="input-key"><strong>input-key</strong><small>키보드·문자 입력</small></button><button type="button" class="sound-card" data-sound="drag-start"><strong>drag-start</strong><small>드래그 시작</small></button><button type="button" class="sound-card" data-sound="drag-end"><strong>drag-end</strong><small>드래그 놓기</small></button><button type="button" class="sound-card" data-sound="save"><strong>save</strong><small>저장 완료</small></button><button type="button" class="sound-card" data-sound="retry"><strong>retry</strong><small>재도전·다시 하기</small></button><button type="button" class="sound-card" data-sound="swipe"><strong>swipe</strong><small>빠른 스와이프</small></button><button type="button" class="sound-card" data-sound="whoosh"><strong>whoosh</strong><small>화면 전환·빠른 통과</small></button><button type="button" class="sound-card" data-sound="slide"><strong>slide</strong><small>미끄러짐·슬라이드 이동</small></button><button type="button" class="sound-card" data-sound="bounce"><strong>bounce</strong><small>튕김·반동</small></button><button type="button" class="sound-card" data-sound="roll"><strong>roll</strong><small>굴러가기·주사위 회전</small></button><button type="button" class="sound-card" data-sound="impact-soft"><strong>impact-soft</strong><small>가벼운 충돌·착지</small></button><button type="button" class="sound-card" data-sound="impact-hard"><strong>impact-hard</strong><small>강한 충돌·실패 타격</small></button><button type="button" class="sound-card" data-sound="piece-place"><strong>piece-place</strong><small>퍼즐 조각 놓기</small></button><button type="button" class="sound-card" data-sound="piece-remove"><strong>piece-remove</strong><small>퍼즐 조각 제거</small></button><button type="button" class="sound-card" data-sound="match"><strong>match</strong><small>같은 항목 연결·매치</small></button><button type="button" class="sound-card" data-sound="merge"><strong>merge</strong><small>합치기·진화</small></button><button type="button" class="sound-card" data-sound="line-clear"><strong>line-clear <script src="./js/hm-audio-manager.v1.js?v=1.2.0"></script>
<script>
(() => {
  "use strict";

  const BASE_URL = "./sfx/core/v1/";
  const status = document.getElementById("status");
  const meta = document.getElementById("meta");
  const toggle = document.getElementById("soundToggle");
  const stopButton = document.getElementById("stopAll");
  const reloadButton = document.getElementById("reloadManifest");
  let currentButton = null;

  HMAudio.init({ baseUrl: BASE_URL, volume: 0.85 });

  function setStatus(message, type = "") {
    status.textContent = message;
    status.className = "status" + (type ? " " + type : "");
  }

  function updateToggle() {
    const enabled = HMAudio.isEnabled();
    toggle.textContent = enabled ? "사운드 켜짐" : "사운드 꺼짐";
    toggle.classList.toggle("primary", enabled);
  }

  function clearCurrent() {
    if (currentButton) currentButton.classList.remove("is-playing");
    currentButton = null;
  }

  async function checkManifest() {
    try {
      const response = await fetch(BASE_URL + "sounds.json?v=1.2.0", { cache: "no-store" });
      if (!response.ok) throw new Error("HTTP " + response.status);
      const manifest = await response.json();
      const count = Object.keys(manifest.sounds || {}).length;
      meta.textContent =
        "HMAudio " + HMAudio.getVersion() +
        " · sounds.json " + count + "개 · baseUrl " + new URL(BASE_URL, location.href).href;
      setStatus("관리자와 sounds.json 연결 정상", "success");
    } catch (error) {
      meta.textContent = "sounds.json을 불러오지 못했습니다: " + error.message;
      setStatus("GitHub Pages 배포 경로를 확인해 주세요.", "error");
    }
  }

  toggle.addEventListener("click", () => {
    const enabled = HMAudio.setEnabled(!HMAudio.isEnabled());
    updateToggle();
    setStatus(enabled ? "사운드를 켰습니다." : "사운드를 껐습니다.");
  });

  stopButton.addEventListener("click", () => {
    HMAudio.stopAll();
    clearCurrent();
    setStatus("모든 사운드를 정지했습니다.");
  });

  reloadButton.addEventListener("click", async () => {
    HMAudio.clearCache();
    await checkManifest();
  });

  document.addEventListener("click", async (event) => {
    const button = event.target.closest("[data-sound]");
    if (!button) return;

    if (!HMAudio.isEnabled()) {
      HMAudio.setEnabled(true);
      updateToggle();
    }

    HMAudio.unlock();
    HMAudio.stopAll();
    clearCurrent();

    const name = button.dataset.sound;
    currentButton = button;
    button.classList.add("is-playing");
    setStatus(name + " 불러오는 중");

    const played = await HMAudio.play(name, { volume: 1 });

    if (played) {
      setStatus(name + " 재생 요청 완료", "success");
    } else {
      button.classList.remove("is-playing");
      currentButton = null;
      setStatus(name + " 재생 실패: sounds.json과 MP3 파일을 확인하세요.", "error");
    }

    window.setTimeout(() => {
      if (currentButton === button) {
        button.classList.remove("is-playing");
        currentButton = null;
      }
    }, 6000);
  });

  updateToggle();
  checkManifest();
})();
</script>
