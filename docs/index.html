<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#e9f6ff">
  <title>Healing Mart Mini Game Sound Pack</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;padding:24px 14px 50px;background:linear-gradient(180deg,#e8f7ff,#f7fbff 36%,#f4f6fb);color:#172a4d;font-family:system-ui,-apple-system,"Noto Sans KR",sans-serif}
    main{width:min(1080px,100%);margin:0 auto}
    .hero{padding:24px;border:1px solid #fff;border-radius:26px;background:rgba(255,255,255,.88);box-shadow:0 16px 44px rgba(48,105,158,.12)}
    h1{margin:0;font-size:clamp(25px,5vw,38px);letter-spacing:-.045em}
    .lead{margin:8px 0 0;color:#617493;line-height:1.7}
    .toolbar{margin-top:18px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
    .toolbar button,.category-button{min-height:42px;padding:0 14px;border:1px solid #d4e5f5;border-radius:13px;background:#fff;color:#28578d;font-weight:800;cursor:pointer}
    .toolbar button.primary{color:#fff;border:0;background:linear-gradient(135deg,#397fe4,#1baeb0)}
    .status{min-height:24px;margin:12px 0 0;color:#526987;font-size:13px;font-weight:700}
    .stats{margin-top:14px;display:flex;flex-wrap:wrap;gap:8px}
    .stat{padding:7px 11px;border-radius:999px;background:#edf7ff;color:#2a68ad;font-size:12px;font-weight:850}
    .categories{margin:18px 0 0;display:flex;gap:7px;overflow:auto;padding-bottom:3px}
    .category-button.is-active{color:#fff;border-color:#347dde;background:#347dde}
    .section{margin-top:20px}
    .section h2{margin:0 0 10px;font-size:18px;letter-spacing:-.03em}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
    .sound{min-height:108px;padding:14px;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:6px 10px;text-align:left;border:1px solid #dce8f4;border-radius:17px;background:#fff;box-shadow:0 7px 18px rgba(52,89,128,.07);cursor:pointer}
    .sound:hover{transform:translateY(-1px);border-color:#7aaee6}
    .sound:focus-visible{outline:3px solid rgba(53,127,226,.22);outline-offset:2px}
    .sound strong{overflow:hidden;text-overflow:ellipsis;color:#1c4f88;font-size:14px;white-space:nowrap}
    .sound small{grid-column:1/3;color:#6c7f99;line-height:1.45}
    .duration{color:#169395;font-size:11px;font-weight:900}
    .category{align-self:end;justify-self:start;padding:3px 7px;border-radius:999px;background:#f0f6fc;color:#617998;font-size:10px;font-weight:850}
    .sound.is-playing{border-color:#17aaa9;box-shadow:0 0 0 3px rgba(23,170,169,.13),0 8px 20px rgba(52,89,128,.08)}
    .error{padding:20px;border-radius:18px;background:#fff3f1;color:#a83e35}
    footer{margin-top:28px;color:#73839a;font-size:12px;line-height:1.7;text-align:center}
    @media(max-width:520px){body{padding-left:10px;padding-right:10px}.hero{padding:20px 16px}.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <h1>Healing Mart Mini Game Sound Pack</h1>
      <p class="lead">미니게임 공통 이벤트를 하나의 경로에서 사용하는 88개 통합 사운드 팩입니다. 버튼을 누르면 해당 음원을 바로 미리 들을 수 있습니다.</p>
      <div class="toolbar">
        <button id="soundToggle" class="primary" type="button">사운드 켜기</button>
        <button id="stopAll" type="button">모두 정지</button>
      </div>
      <p id="soundStatus" class="status" role="status" aria-live="polite">사운드 대기 중</p>
      <div id="stats" class="stats"></div>
      <div id="categories" class="categories" aria-label="사운드 범주"></div>
    </section>

    <div id="soundSections"></div>
    <footer>Healing Mart용 합성 원본 효과음 팩 · MP3 44.1kHz 모노 · WAV 원본 포함</footer>
  </main>

  <script src="./js/hm-audio-manager.v1.js"></script>
  <script>
    (() => {
      "use strict";

      const categoryNames = {
        all: "전체", ui: "UI", flow: "게임 진행", timer: "타이머",
        judgement: "정답·판정", reward: "점수·보상", action: "아이템·액션",
        assist: "도움 기능", random: "랜덤·룰렛", result: "결과",
        movement: "이동", reaction: "반응 게임", puzzle: "퍼즐", brand: "브랜드"
      };

      const soundToggle = document.getElementById("soundToggle");
      const stopAllButton = document.getElementById("stopAll");
      const soundStatus = document.getElementById("soundStatus");
      const stats = document.getElementById("stats");
      const categories = document.getElementById("categories");
      const soundSections = document.getElementById("soundSections");
      let manifest = null;
      let currentCategory = "all";

      HMAudio.init({
        baseUrl: "./sfx/core/v1/",
        volume: 0.78,
        maxVoices: 24
      });

      function updateSoundToggle() {
        soundToggle.textContent = HMAudio.isEnabled() ? "사운드 끄기" : "사운드 켜기";
      }

      function groupSounds() {
        const groups = {};

        Object.entries(manifest.sounds).forEach(([name, item]) => {
          const category = item.category || "other";

          if (!groups[category]) {
            groups[category] = [];
          }

          groups[category].push([name, item]);
        });

        return groups;
      }

      function renderCategories(groups) {
        const keys = ["all", ...Object.keys(groups)];
        categories.replaceChildren();

        keys.forEach((key) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "category-button";
          button.dataset.category = key;
          button.textContent = categoryNames[key] || key;
          button.classList.toggle("is-active", key === currentCategory);
          categories.appendChild(button);
        });
      }

      function makeSoundButton(name, item) {
        const button = document.createElement("button");
        const title = document.createElement("strong");
        const duration = document.createElement("span");
        const description = document.createElement("small");
        const category = document.createElement("span");

        button.type = "button";
        button.className = "sound";
        button.dataset.sound = name;
        title.textContent = name;
        duration.className = "duration";
        duration.textContent = `${item.durationMs}ms`;
        description.textContent = item.description;
        category.className = "category";
        category.textContent = categoryNames[item.category] || item.category;

        button.append(title, duration, description, category);
        return button;
      }

      function renderSounds() {
        const groups = groupSounds();
        soundSections.replaceChildren();

        Object.entries(groups).forEach(([category, sounds]) => {
          if (currentCategory !== "all" && currentCategory !== category) {
            return;
          }

          const section = document.createElement("section");
          const heading = document.createElement("h2");
          const grid = document.createElement("div");

          section.className = "section";
          heading.textContent = `${categoryNames[category] || category} · ${sounds.length}개`;
          grid.className = "grid";
          sounds.forEach(([name, item]) => grid.appendChild(makeSoundButton(name, item)));
          section.append(heading, grid);
          soundSections.appendChild(section);
        });

        renderCategories(groups);
      }

      async function init() {
        try {
          manifest = await HMAudio.getManifest();
          stats.innerHTML = "";
          const count = document.createElement("span");
          const format = document.createElement("span");
          const version = document.createElement("span");
          count.className = format.className = version.className = "stat";
          count.textContent = `총 ${manifest.soundCount}개`;
          format.textContent = `${manifest.sampleRate}Hz · 모노 MP3`;
          version.textContent = `통합팩 ${manifest.version}`;
          stats.append(count, format, version);
          renderSounds();
        } catch (error) {
          soundSections.innerHTML = '<p class="error">sounds.json을 불러오지 못했습니다. GitHub Pages 배포 경로를 확인해 주세요.</p>';
        }
      }

      soundToggle.addEventListener("click", () => {
        const enabled = HMAudio.setEnabled(!HMAudio.isEnabled());

        if (enabled) {
          HMAudio.unlock();
          HMAudio.play("toggle-on", { force: true });
          soundStatus.textContent = "사운드가 켜졌습니다.";
        } else {
          soundStatus.textContent = "사운드가 꺼졌습니다.";
        }

        updateSoundToggle();
      });

      stopAllButton.addEventListener("click", () => {
        HMAudio.stopAll();
        soundStatus.textContent = "재생 중인 사운드를 정지했습니다.";
        document.querySelectorAll(".sound.is-playing").forEach((button) => button.classList.remove("is-playing"));
      });

      categories.addEventListener("click", (event) => {
        const button = event.target.closest("[data-category]");

        if (!button) {
          return;
        }

        currentCategory = button.dataset.category;
        renderSounds();
      });

      soundSections.addEventListener("click", async (event) => {
        const button = event.target.closest("[data-sound]");

        if (!button) {
          return;
        }

        const soundName = button.dataset.sound;

        if (!HMAudio.isEnabled()) {
          HMAudio.setEnabled(true);
          updateSoundToggle();
        }

        HMAudio.unlock();
        document.querySelectorAll(".sound.is-playing").forEach((item) => item.classList.remove("is-playing"));
        button.classList.add("is-playing");
        soundStatus.textContent = `${soundName} 재생 중`;
        const played = await HMAudio.play(soundName, { force: true });
        soundStatus.textContent = played ? `${soundName} 재생 완료` : `${soundName} 대체음을 재생했습니다.`;
        window.setTimeout(() => button.classList.remove("is-playing"), 900);
      });

      updateSoundToggle();
      init();
    })();
  </script>
</body>
</html>
